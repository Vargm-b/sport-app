<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Items Deportivos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>Registro de Items</h1>
    
    <div class="input-group">
      <input id="itemName" type="text" placeholder="Nombre del ítem">
      <input id="itemValue" type="number" placeholder="Valor">
      <button id="addItemBtn">Añadir</button>
    </div>

    <ol id="itemList"></ol>
  </main>

  <script src="app.js"></script>
</body>
</html>
